mixed-port: 7890
allow-lan: true
mode: rule
log-level: info

ipv6: true

# ========================
# DNS
# ========================

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip

  nameserver:
    - 1.1.1.1
    - 8.8.8.8

  fake-ip-range: 198.18.0.1/16



# ========================
# PROXY PROVIDER (агрегатор)
# ========================

proxy-providers:

  subscription:
    type: http
    url: https://aur-ora.com/sub?uuid=e4519b6f-df98-4f20-abac-4c8e52baa6a4
    path: ./providers/subscription.yaml
    interval: 3600

    health-check:
      enable: true
      interval: 600
      url: https://www.gstatic.com/generate_204



# ========================
# PROXY GROUPS
# ========================

proxy-groups:

  - name: VPN
    type: select
    use:
      - subscription
    proxies:
      - AUTO
      - DIRECT

  - name: AUTO
    type: url-test
    use:
      - subscription
    url: https://www.gstatic.com/generate_204
    interval: 300



# ========================
# RULE PROVIDERS
# ========================

rule-providers:

  LAN:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/LAN.list
    path: ./rules/LAN.list
    interval: 86400

  SYSTEM:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/SYSTEM.list
    path: ./rules/SYSTEM.list
    interval: 86400

  proxy:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/proxy.list
    path: ./rules/proxy.list
    interval: 86400

  youtube:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/proxy-youtube.list
    path: ./rules/youtube.list
    interval: 86400

  geoip:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/proxy-geoip.list
    path: ./rules/geoip.list
    interval: 86400

  telegram:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/telegram.list
    path: ./rules/telegram.list
    interval: 86400

  whatsapp:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/whatsapp.list
    path: ./rules/whatsapp.list
    interval: 86400

  roblox:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HunTer44x/surge/main/roblox.list
    path: ./rules/roblox.list
    interval: 86400



# ========================
# RULES
# ========================

rules:

  - RULE-SET,LAN,DIRECT
  - RULE-SET,SYSTEM,DIRECT

  - RULE-SET,proxy,VPN
  - RULE-SET,youtube,VPN
  - RULE-SET,geoip,VPN
  - RULE-SET,telegram,VPN
  - RULE-SET,whatsapp,VPN
  - RULE-SET,roblox,VPN

  - GEOIP,RU,DIRECT

  - MATCH,VPN